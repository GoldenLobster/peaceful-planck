name: Build Unsigned IPA for Sideloading

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build iOS App (No Codesign)
        run: |
          cd ios
          pod install
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos SYMROOT=$(PWD)/build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos/
          zip -qq -r -9 ytmUltimate.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytmUltimate.ipa
          path: build/ios/iphoneos/ytmUltimate.ipa
